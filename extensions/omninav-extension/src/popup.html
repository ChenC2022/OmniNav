<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>OmniNav</title>
    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@20..48,100..700,0..1,-50..200" />
    <style>
      :root {
        --bg:           #ffffff;
        --bg-subtle:    #fafafa;
        --bg-muted:     #f3f4f6;
        --bg-warn:      #fff7ed;
        --border:       #e5e7eb;
        --border-warn:  #fed7aa;
        --text:         #111827;
        --text-muted:   #4b5563;
        --text-faint:   #9ca3af;
        --text-warn:    #9a3412;
        --divider:      #f3f4f6;
        --pinned-label: #9ca3af;
        --pinned-icon-bg: #f3f4f6;
        --pinned-icon-color: #6b7280;
        --result-hover: #f5f5f5;
        --cat-bg:       #ede9fe;
        --cat-text:     #6d28d9;
        --card-bg:      #f5f3ff;
        --card-border:  #e0e7ff;
        --card-label:   #7c3aed;
        --input-bg:     #fafafa;
        --input-border: #e5e7eb;
        --url-text:     #9ca3af;
        --msg-bg:       #f6f6f6;
        --msg-border:   #e5e5e5;
        --web-btn-bg:   #ffffff;
        --web-btn-border: #e5e7eb;
        --web-btn-text: #4b5563;
        --sync-text:    #9ca3af;
      }
      @media (prefers-color-scheme: dark) {
        :root {
          --bg:           #1f2937;
          --bg-subtle:    #1f2937;
          --bg-muted:     #374151;
          --bg-warn:      #431407;
          --border:       #374151;
          --border-warn:  #7c2d12;
          --text:         #f9fafb;
          --text-muted:   #d1d5db;
          --text-faint:   #6b7280;
          --text-warn:    #fca5a5;
          --divider:      #374151;
          --pinned-label: #6b7280;
          --pinned-icon-bg: #374151;
          --pinned-icon-color: #9ca3af;
          --result-hover: #374151;
          --cat-bg:       #3b0764;
          --cat-text:     #c4b5fd;
          --card-bg:      #2e1065;
          --card-border:  #4c1d95;
          --card-label:   #a78bfa;
          --input-bg:     #374151;
          --input-border: #4b5563;
          --url-text:     #6b7280;
          --msg-bg:       #374151;
          --msg-border:   #4b5563;
          --web-btn-bg:   #374151;
          --web-btn-border: #4b5563;
          --web-btn-text: #d1d5db;
          --sync-text:    #6b7280;
        }
      }
      * { box-sizing: border-box; margin: 0; padding: 0; }
      body { background: var(--bg); color: var(--text); }
      .ms { font-family: 'Material Symbols Outlined'; font-size: 18px; line-height: 1;
            font-weight: normal; font-style: normal; letter-spacing: normal;
            text-transform: none; display: inline-block; white-space: nowrap;
            word-wrap: normal; direction: ltr; -webkit-font-smoothing: antialiased; }
      .icon-btn {
        width: 32px; height: 32px; border-radius: 8px; border: 1px solid var(--border);
        background: var(--bg); color: var(--text-muted); cursor: pointer;
        display: flex; align-items: center; justify-content: center;
        transition: background .15s, color .15s; flex-shrink: 0;
      }
      .icon-btn:hover { background: var(--bg-muted); }
      .icon-btn.primary { background: #4f46e5; border-color: #4f46e5; color: white; }
      .icon-btn.primary:hover { background: #4338ca; }
      .icon-btn.teal { background: #0891b2; border-color: #0891b2; color: white; }
      .icon-btn.teal:hover { background: #0e7490; }
      .icon-btn.dark { background: #1f2937; border-color: #1f2937; color: white; }
      .icon-btn.dark:hover { background: #374151; }
      /* 搜索结果行 hover */
      .result-row:hover { background: var(--result-hover); }
      /* 搜索输入框 focus */
      input:focus { border-color: #6366f1 !important; box-shadow: 0 0 0 2px rgba(99,102,241,.2); }
      select:focus { border-color: #6366f1 !important; outline: none; }
    </style>
  </head>
  <body>
    <div id="app">
      <div style="font-family: ui-sans-serif; padding: 12px; width: 340px;">
        <div style="color: var(--text-faint); font-size: 12px;">正在加载…</div>
      </div>
    </div>
    <script type="module" src="/ui/popup/main.ts"></script>
  </body>
</html>
